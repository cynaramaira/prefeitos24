<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dança das cadeiras dos Partidos - Pernambuco</title>
    <!-- Carrega Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Carrega a fonte Inter do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- PapaParse para processar o CSV do Google Sheets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f3f4f6;
        }
        #root {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .loader {
            border-top-color: #024796;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Configurações Globais
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vShib7PQcrDNa8GDJqwUZcopaKqJ5azAs8_fG7aYyWCJwLy9bHykiHR7yIQrWRp7cZClH9RFtjq0PqQ/pub?output=csv";
        const PRIMARY_COLOR = "#024796"; 
        const ACCENT_COLOR = "#f83d03"; 
        const LIGHT_ACCENT_COLOR_BG = "#FFEFE5";

        function App() {
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');

            useEffect(() => {
                fetchData();
            }, []);

            const fetchData = () => {
                setLoading(true);
                Papa.parse(CSV_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => {
                        // Mapeamento rigoroso conforme os cabeçalhos informados:
                        // id, City, Mayor, OldParty, NewParty, PhotoUrl, RAQUEL OU JOÃO?
                        const formattedData = results.data.map(row => ({
                            city: row.City || row.city || "",
                            mayor: row.Mayor || row.mayor || "",
                            oldParty: row.OldParty || row.oldParty || "",
                            newParty: row.NewParty || row.newParty || "",
                            photoUrl: row.PhotoUrl || row.photoUrl || ""
                        })).filter(item => item.mayor !== ""); // Remove linhas vazias acidentais

                        setData(formattedData);
                        setLoading(false);
                    },
                    error: (err) => {
                        console.error("Erro PapaParse:", err);
                        setError("Erro ao processar a planilha. Verifique a publicação do link.");
                        setLoading(false);
                    }
                });
            };

            const overviewData = useMemo(() => {
                if (data.length === 0) return { prefeiturasAnalisadas: 0, transferencias: 0, permanencias: 0, taxaDeMudanca: 0 };
                const prefeiturasAnalisadas = data.length;
                const transferencias = data.filter(d => d.oldParty.trim() !== d.newParty.trim()).length;
                const permanencias = data.filter(d => d.oldParty.trim() === d.newParty.trim()).length;
                const taxaDeMudanca = ((transferencias / prefeiturasAnalisadas) * 100).toFixed(1);
                return { prefeiturasAnalisadas, transferencias, permanencias, taxaDeMudanca };
            }, [data]);

            const placarData = useMemo(() => {
                const partyStats = {};
                data.forEach(d => {
                    const old = (d.oldParty || "").trim();
                    const current = (d.newParty || "").trim();
                    if(!old || !current) return;

                    partyStats[old] = partyStats[old] || { contratacoes: 0, saidas: 0, saldo: 0 };
                    partyStats[current] = partyStats[current] || { contratacoes: 0, saidas: 0, saldo: 0 };

                    if (old !== current) {
                        partyStats[old].saidas++;
                        partyStats[old].saldo--;
                        partyStats[current].contratacoes++;
                        partyStats[current].saldo++;
                    }
                });

                return Object.entries(partyStats)
                    .map(([party, stats]) => ({ party, ...stats }))
                    .sort((a, b) => b.saldo - a.saldo);
            }, [data]);

            const classificacaoData = useMemo(() => {
                const prefeiturasPorPartido = {};
                data.forEach(d => {
                    const p = (d.newParty || "").trim();
                    if(!p) return;
                    prefeiturasPorPartido[p] = (prefeiturasPorPartido[p] || 0) + 1;
                });

                return Object.entries(prefeiturasPorPartido)
                    .map(([party, count]) => ({
                        party,
                        prefeituras: count,
                        saldoFinal: placarData.find(p => p.party === party)?.saldo || 0
                    }))
                    .sort((a, b) => b.prefeituras - a.prefeituras);
            }, [data, placarData]);

            const filteredTransfers = useMemo(() => {
                const lowerCaseSearchTerm = searchTerm.toLowerCase();
                return data.filter(entry => {
                    return (entry.mayor || '').toLowerCase().includes(lowerCaseSearchTerm) ||
                           (entry.city || '').toLowerCase().includes(lowerCaseSearchTerm) ||
                           (entry.oldParty || '').toLowerCase().includes(lowerCaseSearchTerm) ||
                           (entry.newParty || '').toLowerCase().includes(lowerCaseSearchTerm);
                });
            }, [data, searchTerm]);

            const getMayorPhotoSrc = (mayorName, photoUrl) => {
                if (photoUrl && photoUrl.trim().startsWith('http')) return photoUrl.trim();
                const nameParts = (mayorName || '').split(' ');
                let initials = nameParts.length > 0 ? nameParts[0].charAt(0) : '?';
                if (nameParts.length > 1) initials += nameParts[nameParts.length - 1].charAt(0);
                return `https://placehold.co/120x120/${PRIMARY_COLOR.replace('#', '')}/ffffff?text=${initials.toUpperCase()}`;
            };

            if (loading) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                        <h2 className="text-xl font-semibold text-gray-700">Sincronizando com a planilha...</h2>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen p-4 text-center">
                        <div className="bg-red-100 border border-red-400 text-red-700 px-6 py-4 rounded-lg shadow-md max-w-md">
                            <p className="font-bold text-lg mb-2">Erro de Sincronização</p>
                            <p>{error}</p>
                            <button onClick={fetchData} className="mt-4 bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700 transition">Tentar novamente</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-100 p-4 md:p-6 font-sans flex flex-col items-center w-full">
                    <header className="w-full max-w-6xl bg-white p-6 md:p-8 rounded-2xl shadow-xl mb-10 flex flex-col items-center text-center">
                        <a href="https://jamildo.com" target="_blank" rel="noopener noreferrer">
                            <img src="https://jamildo.com/media/uploads/logojamildo.png" alt="Logo Jamildo.com" width="200" className="mb-6 object-contain" onError={(e) => e.target.style.display = 'none'} />
                        </a>
                        <h1 className="text-3xl md:text-5xl font-extrabold mb-3" style={{ color: PRIMARY_COLOR }}>
                            <span className="text-4xl md:text-6xl" style={{ color: ACCENT_COLOR }}>🪑</span> Dança das cadeiras dos Partidos
                        </h1>
                        <p className="text-lg md:text-xl text-gray-600 font-semibold uppercase tracking-tight">Pernambuco</p>
                    </header>

                    <section className="w-full max-w-6xl grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-10">
                        <StatCard title="Prefeituras" value={overviewData.prefeiturasAnalisadas} color={PRIMARY_COLOR} icon="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1" />
                        <StatCard title="Transferências" value={overviewData.transferencias} color={ACCENT_COLOR} icon="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4" />
                        <StatCard title="Permanências" value={overviewData.permanencias} color={PRIMARY_COLOR} icon="M9 12l2 2 4-4m6 2a9 9 0 11-18 0" />
                        <StatCard title="Taxa de Mudança" value={`${overviewData.taxaDeMudanca}%`} color={ACCENT_COLOR} icon="M13 7l0 10m0 0l4-4m-4 4l-4-4" />
                    </section>

                    <section className="w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-6 mb-10">
                        <TableCard title="Placar de Transferências" headers={['PARTIDO', 'CONTRAT.', 'SAÍDAS', 'SALDO']} data={placarData} type="placar" />
                        <TableCard title="Classificação Geral" headers={['PARTIDO', 'PREFEITURAS', 'SALDO FINAL']} data={classificacaoData} type="classificacao" />
                    </section>

                    <section className="w-full max-w-6xl bg-white p-6 md:p-8 rounded-2xl shadow-2xl mb-10">
                        <h2 className="text-2xl md:text-3xl font-bold mb-6 text-center" style={{ color: PRIMARY_COLOR }}>Últimas Transferências</h2>
                        <div className="mb-8">
                            <input type="text" placeholder="Buscar por prefeito, cidade ou partido..." className="w-full p-4 border-2 rounded-lg shadow-sm focus:outline-none transition-all duration-200 text-lg" style={{ borderColor: PRIMARY_COLOR }} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                        </div>

                        {filteredTransfers.length === 0 ? (
                            <p className="text-center text-gray-500 py-10">Nenhum resultado encontrado.</p>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredTransfers.map((item, idx) => (
                                    <MayorCard key={idx} item={item} getPhoto={getMayorPhotoSrc} />
                                ))}
                            </div>
                        )}
                    </section>

                    <footer className="w-full max-w-6xl bg-white p-6 rounded-2xl shadow-lg mt-8 text-center text-sm text-gray-500 border-t-2">
                        <p>Os dados acima são extraídos em tempo real da planilha oficial.</p>
                        <p className="font-bold mt-1" style={{ color: PRIMARY_COLOR }}>Jamildo.com</p>
                    </footer>
                </div>
            );
        }

        function StatCard({ title, value, color, icon }) {
            return (
                <div className="bg-white p-6 rounded-xl shadow-lg flex flex-col items-center justify-center text-center transform hover:scale-105 transition-all border-b-4" style={{ borderBottomColor: color }}>
                    <div className="p-3 rounded-full mb-3" style={{ background: color }}>
                        <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={icon}></path></svg>
                    </div>
                    <h3 className="text-xs font-bold text-gray-400 uppercase tracking-widest">{title}</h3>
                    <p className="text-3xl font-black" style={{ color: color }}>{value}</p>
                </div>
            );
        }

        function TableCard({ title, headers, data, type }) {
            return (
                <div className="bg-white p-4 md:p-6 rounded-xl shadow-lg overflow-hidden border-t-4" style={{ borderTopColor: PRIMARY_COLOR }}>
                    <h2 className="text-xl font-bold mb-5 text-center uppercase tracking-tight" style={{ color: PRIMARY_COLOR }}>{title}</h2>
                    <div className="overflow-x-auto">
                        <table className="min-w-full text-sm">
                            <thead className="text-white" style={{ backgroundColor: PRIMARY_COLOR }}>
                                <tr>
                                    {headers.map(h => <th key={h} className="px-4 py-3 text-left font-bold uppercase text-[10px] tracking-wider">{h}</th>)}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-100">
                                {data.map((row, i) => (
                                    <tr key={i} className={i % 2 === 0 ? 'bg-gray-50' : 'bg-white'}>
                                        <td className="px-4 py-3 font-bold text-gray-700">{row.party}</td>
                                        {type === 'placar' ? (
                                            <>
                                                <td className="px-4 py-3 text-blue-700 font-bold">{row.contratacoes}</td>
                                                <td className="px-4 py-3 text-red-600 font-bold">{row.saidas}</td>
                                                <td className="px-4 py-3 font-black" style={{ color: row.saldo > 0 ? '#16a34a' : (row.saldo < 0 ? ACCENT_COLOR : '#6b7280') }}>
                                                    {row.saldo > 0 ? `+${row.saldo}` : row.saldo}
                                                </td>
                                            </>
                                        ) : (
                                            <>
                                                <td className="px-4 py-3 text-gray-800 font-bold">{row.prefeituras}</td>
                                                <td className="px-4 py-3 font-black" style={{ color: row.saldoFinal > 0 ? '#16a34a' : (row.saldoFinal < 0 ? ACCENT_COLOR : '#6b7280') }}>
                                                    {row.saldoFinal > 0 ? `+${row.saldoFinal}` : row.saldoFinal}
                                                </td>
                                            </>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function MayorCard({ item, getPhoto }) {
            const isTransfer = (item.oldParty || "").trim() !== (item.newParty || "").trim();
            const borderColor = isTransfer ? ACCENT_COLOR : PRIMARY_COLOR;
            const bgColor = isTransfer ? LIGHT_ACCENT_COLOR_BG : 'white';

            return (
                <div className="p-4 rounded-xl shadow-md flex items-center space-x-4 border-l-4 transform hover:translate-y-[-4px] transition-all" style={{ backgroundColor: bgColor, borderColor: borderColor }}>
                    <div className="flex-shrink-0">
                        <img src={getPhoto(item.mayor, item.photoUrl)} alt={item.mayor} className="w-14 h-14 rounded-full object-cover border-2 shadow-sm" style={{ borderColor: borderColor }} onError={(e) => { e.target.onerror = null; e.target.src = `https://placehold.co/100x100/${PRIMARY_COLOR.replace('#','')}/ffffff?text=?`; }} />
                    </div>
                    <div className="flex-grow min-w-0">
                        <p className="font-black text-gray-900 truncate leading-tight">{item.mayor}</p>
                        <p className="text-[10px] font-bold text-gray-400 uppercase truncate mb-2">{item.city}</p>
                        <div className="flex items-center gap-1 flex-wrap">
                            <span className="px-2 py-0.5 rounded text-[10px] font-black text-white uppercase shadow-sm" style={{ backgroundColor: PRIMARY_COLOR }}>{item.oldParty}</span>
                            {isTransfer && (
                                <>
                                    <svg className="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7l5 5m0 0l-5 5m5-5H6" strokeWidth="4" strokeLinecap="round" strokeLinejoin="round"/></svg>
                                    <span className="px-2 py-0.5 rounded text-[10px] font-black text-white uppercase shadow-sm" style={{ backgroundColor: ACCENT_COLOR }}>{item.newParty}</span>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
